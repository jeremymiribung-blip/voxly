name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build, Clippy, Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check
        working-directory: src-tauri
        run: cargo check -p voxly

      - name: Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy -p voxly --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test -p voxly --lib

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt -p voxly -- --check

  # Note: Full Tauri desktop build requires more setup (system deps, signing, etc.)
  # This skeleton focuses on the Rust lib quality. Expand for tauri build in release CI.
